services:
  web:
    build:
      target: development
    ports: !override
      - "127.0.0.1:5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      BIANCO_SYNC_TOKEN: ${BIANCO_SYNC_TOKEN:-development-token}
    depends_on:
      api:
        condition: service_started

  api:
    build:
      target: development
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./server:/app
      - ./data:/data
    environment:
      BIANCO_DATABASE_URL: sqlite:////data/bianco-dev.db
      BIANCO_DATA_DIR: /data
      BIANCO_SYNC_TOKEN: ${BIANCO_SYNC_TOKEN:-development-token}
      BIANCO_AUTH_USER: ${BIANCO_AUTH_USER:-bianco}
      BIANCO_AUTH_PASSWORD_HASH: ${BIANCO_AUTH_PASSWORD_HASH:-$$2y$$05$$wIb9ZBmxVX2BJzYghjpQX.J2xJpUcYs78ZZFa0DnH52HukX7o0SfG}
      BIANCO_SESSION_COOKIE_SECURE: "false"

volumes:
  client_node_modules:
