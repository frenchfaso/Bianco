services:
  web:
    build:
      target: development
    ports: !override
      - "127.0.0.1:5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      BIANCO_SYNC_TOKEN: ${BIANCO_SYNC_TOKEN:-development-token}
    depends_on:
      api:
        condition: service_started

  api:
    build:
      target: development
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./server:/app
      - ./data:/data
    environment:
      BIANCO_DATABASE_URL: sqlite:////data/bianco-dev.db
      BIANCO_DATA_DIR: /data
      BIANCO_SYNC_TOKEN: ${BIANCO_SYNC_TOKEN:-development-token}

volumes:
  client_node_modules:
