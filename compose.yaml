name: bianco

services:
  web:
    build:
      context: ./client
      target: production
    ports:
      - "${BIANCO_BIND_ADDRESS:-127.0.0.1}:${BIANCO_HTTP_PORT:-8080}:80"
    environment:
      BIANCO_SITE_ADDRESS: ${BIANCO_SITE_ADDRESS:-:80}
      BIANCO_SYNC_TOKEN: ${BIANCO_SYNC_TOKEN:?Set BIANCO_SYNC_TOKEN in .env}
      BIANCO_AUTH_USER: ${BIANCO_AUTH_USER:?Set BIANCO_AUTH_USER in .env}
      BIANCO_AUTH_PASSWORD_HASH: ${BIANCO_AUTH_PASSWORD_HASH:?Set BIANCO_AUTH_PASSWORD_HASH in .env}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./server
      target: production
    environment:
      BIANCO_DATABASE_URL: sqlite:////data/bianco.db
      BIANCO_DATA_DIR: /data
      BIANCO_SYNC_TOKEN: ${BIANCO_SYNC_TOKEN:?Set BIANCO_SYNC_TOKEN in .env}
      BIANCO_SECRET_KEY: ${BIANCO_SECRET_KEY:?Set BIANCO_SECRET_KEY in .env}
      BIANCO_AI_PROVIDER: ${BIANCO_AI_PROVIDER:-none}
      BIANCO_AI_WORKER_ENABLED: ${BIANCO_AI_WORKER_ENABLED:-true}
      BIANCO_AI_WORKER_POLL_SECONDS: ${BIANCO_AI_WORKER_POLL_SECONDS:-2}
      BIANCO_AI_WORKER_MAX_ATTEMPTS: ${BIANCO_AI_WORKER_MAX_ATTEMPTS:-5}
      BIANCO_MAX_UPLOAD_BYTES: ${BIANCO_MAX_UPLOAD_BYTES:-10485760}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
    volumes:
      - bianco_data:/data
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c 'import urllib.request; urllib.request.urlopen("http://localhost:8000/api/health/live")'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  bianco_data:
  caddy_data:
  caddy_config:
